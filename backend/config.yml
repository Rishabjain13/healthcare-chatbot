    - "Genetic testing (methylation)"

# Appointment Settings
appointments:
  initial_duration_minutes: 30
  followup_duration_minutes: 20  # Can range 20-30 minutes
  followup_duration_max_minutes: 30
  complex_case_duration_minutes: 60
  booking_advance_days: 60  # How far ahead patients can book
  cancellation_hours: 24
  cancellation_fee_percent: 50
  average_wait_days:
    urgent: "1-2 days"
    regular: "3-5 days"
    followup: "1-3 days"
  duration_note: "Standard consultations are 30 minutes, follow-ups 20-30 minutes, and complex cases up to 60 minutes"

# Payment Options
payment:
  methods:
    - "Cash"
    - "Credit/Debit Cards (Visa, Mastercard, Amex)"
    - "Bank Transfer"
    - "Apple Pay / Samsung Pay"
  insurance:
    accepted: true
    direct_billing: true
    note: "Coverage varies by plan - please verify before visit"

# Google Calendar Settings (for appointment booking)
google_calendar:
  enabled: true  # ✅ ENABLED - Set to true after setup
  calendar_id: "primary"  # "primary" = your main calendar
  credentials_file: "google_credentials.json"
  token_file: "google_token.json"

# Communication Settings
communication:
  whatsapp_support: true
  email_support: true
  response_time_hours: "2-3 hours during business hours"
  quick_questions_free: true
  quick_questions_max_minutes: 10

# Age Groups Accepted
age_groups:
  adults: true
  adolescents: true
  children: true
  pediatric_note: "Children accepted case by case with parent consent"

# Bot Personality
bot:
  personality: "professional"  # Options: friendly, professional, casual
