    qualifications: "MD, Pediatrician, Certified in Functional Medicine – IFM (Institute for Functional Medicine), Clinical Nutritionist"
    specialties:
      - "Digestive health & gut issues"
      - "Hormonal imbalances"
      - "Chronic fatigue"
      - "Autoimmune conditions"
      - "Metabolic health"
    languages: ["English", "Arabic"]
    locations: ["Cairo", "Dubai"]
    experience_years: 10
    approach: "Root cause analysis and personalized treatment plans"

# Services & Specialties
services:
  consultation_types:
    - "In-person consultation"
    - "Virtual consultation (Zoom video call)"
    - "Follow-up consultation"
    - "Emergency consultation"

  virtual_consultation:
    platform: "Zoom"
    note: "Online consultations via Zoom available on Thursday & Saturday, 9 AM - 5 PM"
    booking_process: "Book your preferred time slot and we'll send you a Zoom link"
    same_pricing: true

  in_person_consultation:
    note: "In-person consultations at our clinics in Cairo and Dubai available Monday, Tuesday, Wednesday, Friday, 9 AM - 5 PM"
    locations: ["Cairo", "Dubai"]

  specialties:
    - "Digestive health (IBS, bloating, SIBO)"
    - "Hormonal imbalances (thyroid, PCOS, menopause)"
    - "Chronic fatigue & energy issues"
    - "Weight management & metabolic health"
    - "Autoimmune conditions"
    - "Nutritional deficiencies"
    - "Stress & adrenal issues"
    - "Sleep disorders"

  treatment_methods:
    - "Personalized nutrition plans"
    - "Targeted supplementation"
    - "Lifestyle modifications"
    - "Stress management"
    - "Sleep optimization"
    - "Exercise guidance"
    - "Medication (when necessary)"

# Lab Testing
lab_testing:
  onsite_blood_draw: true
  partner_labs: true
  results_timing:
    standard_blood: "2-3 days"
