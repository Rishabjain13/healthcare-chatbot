    functional_tests: "7-14 days"
    stool_hormone: "10-14 days"

  available_tests:
    - "Comprehensive blood panels"
    - "Food sensitivity panels (IgG)"
    - "Hormone testing (saliva/blood)"
    - "Gut microbiome analysis"
    - "Stool testing (SIBO, parasites)"
    - "Toxic metal screening"
