version: "3.9"

services:
  chatbot-backend:
    container_name: chatbot-backend
    image: chatbot-backend:latest
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "3000:3000"

    env_file:
      - .env

    volumes:
      # Persist logs
      - chatbot_logs:/app/logs

      # Google / external credentials
      - chatbot_credentials:/app/credentials

    restart: unless-stopped

volumes:
  chatbot_logs:
  chatbot_credentials: