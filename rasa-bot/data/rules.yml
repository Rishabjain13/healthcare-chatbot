version: "3.1"

rules:

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

# ===== APPOINTMENT & BOOKING RULES =====
- rule: Provide clinic hours
  steps:
  - intent: ask_hours
  - action: utter_hours

# Appointment booking now uses stories instead of rules to handle the flow

- rule: Activate booking form - online
  steps:
  - intent: select_online_consultation
  - action: utter_book_online_appointment
  - action: booking_form
  - active_loop: booking_form

- rule: Activate booking form - offline
  steps:
  - intent: select_offline_consultation
  - action: utter_book_offline_appointment
  - action: booking_form
  - active_loop: booking_form

- rule: Submit booking form
  condition:
  - active_loop: booking_form
  steps:
  - action: booking_form
  - active_loop: null
  - action: action_book_appointment

- rule: Explain online consultation
  steps:
  - intent: ask_online_consultation
  - action: utter_online_consultation

- rule: Explain waiting time
  steps:
  - intent: ask_waiting_time
  - action: utter_waiting_time

- rule: Explain walk-in policy
